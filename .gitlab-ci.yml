    EXAMPLES: "rainmaker_controller"

.unit_test_with_claiming_template:
  image: espressif/idf:release-v5.5
  stage: test
  tags: ["idf_unit_test_runner"]
  needs: []
  before_script:
    - *generate_rainmaker_claim_data
    - *setup_hardware
  script:
    - *build_test_app
    - *flash_firmware
    - |
      if [ -n "${CLAIM_DATA_PATH}" ] && [ -f "${CLAIM_DATA_PATH}/${MAC_ADDR}.bin" ]; then
        echo "Flashing RainMaker claimed data..."
        python3 ${CI_PROJECT_DIR}/resource-pool-cli.py flash "${CLAIM_DATA_PATH}/${MAC_ADDR}.bin" 0x3fa000 ${RESOURCE_CONFIG_FILE}
      else
        echo "Skipping claim data flash (no claim data)."
      fi
    - python3 ${CI_PROJECT_DIR}/resource-pool-cli.py rfc2217-server ${RESOURCE_CONFIG_FILE}
    - python3 $CI_PROJECT_DIR/components/esp_rainmaker/test_app/run_test.py $DEVICE_PORT -l "Enter next test" --log-file result.txt
    - "if grep -qE ':FAIL($|[: ])' result.txt; then echo \"❌ Found FAIL entries in result.txt\"; exit 1; else echo \"✅ No FAIL entries found\"; fi"
  after_script:
    - *release_hardware
    - if command -v esp-rainmaker-cli >/dev/null 2>&1; then esp-rainmaker-cli logout; fi
  artifacts:
    when: always
    paths:
      - components/esp_rainmaker/test_app/result.txt

unit_test_esp32c3:
  extends: .unit_test_with_claiming_template
  variables:
    TARGET: "esp32c3"
    MAC_ADDR: "ABCDABCDABCD"

build_docs:
  stage: build
  image: $ESP_DOCS_ENV_IMAGE
  tags:
    - build_docs
  artifacts:
    paths:
      - docs/_build/*/*/*.txt
      - docs/_build/*/*/html/*
    expire_in: 4 days
  # No cleaning when the artifacts
  after_script: []
  script:
    - mkdir -p components
    - git clone --branch master --depth 1 https://${GITLAB_USER}:${GITLAB_PASSWORD}@${GITLAB_HTTP_SERVER}/app-frameworks/esp-rainmaker-common.git components/rmaker_common
    - cd docs
    - pip install -r requirements.txt
    - build-docs -l en -t esp32

.deploy_docs_template:
  stage: deploy
  image: $ESP_DOCS_ENV_IMAGE
  tags:
    - deploy_docs
  needs:
    - build_docs
  script:
    - source ${CI_PROJECT_DIR}/docs/utils.sh
    - add_doc_server_ssh_keys $DOCS_DEPLOY_PRIVATEKEY $DOCS_DEPLOY_SERVER $DOCS_DEPLOY_SERVER_USER
    - export GIT_VER=$(git describe --always)
    - pip install -r ${CI_PROJECT_DIR}/docs/requirements.txt
    - deploy-docs

deploy_docs_preview:
  extends:
    - .deploy_docs_template
  except:
    refs:
      - master
  variables:
    TYPE: "preview"
    DOCS_BUILD_DIR: "${CI_PROJECT_DIR}/docs/_build/"
    DOCS_DEPLOY_PRIVATEKEY: "$DOCS_PREVIEW_PRIVATEKEY"
    DOCS_DEPLOY_SERVER: "$DOCS_PREVIEW_SERVER"
    DOCS_DEPLOY_SERVER_USER: "$DOCS_PREVIEW_USER"
    DOCS_DEPLOY_PATH: "$DOCS_PREVIEW_PATH"
    DOCS_DEPLOY_URL_BASE: "$DOCS_PREVIEW_URL_BASE"

deploy_docs_production:
  extends:
    - .deploy_docs_template
  only:
    refs:
      - master
  variables:
    TYPE: "production"
    DOCS_BUILD_DIR: "${CI_PROJECT_DIR}/docs/_build/"
    DOCS_DEPLOY_PRIVATEKEY: "$DOCS_PROD_PRIVATEKEY"
    DOCS_DEPLOY_SERVER: "$DOCS_PROD_SERVER"
    DOCS_DEPLOY_SERVER_USER: "$DOCS_PROD_USER"
    DOCS_DEPLOY_PATH: "$DOCS_PROD_PATH"
    DOCS_DEPLOY_URL_BASE: "$DOCS_PROD_URL_BASE"

push_master_to_github:
  stage: deploy
  image: espressif/idf:latest
  tags:
    - build
  when: on_success
  dependencies: []
  only:
    - master
  script:
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo -n $GH_PUSH_KEY > ~/.ssh/id_rsa_base64
    - base64 --decode --ignore-garbage ~/.ssh/id_rsa_base64 > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - echo -e "Host github.com\n\tStrictHostKeyChecking no\n" >> ~/.ssh/config
    - git remote remove github &>/dev/null || true
    - git remote add github git@github.com:espressif/esp-rainmaker.git
    - git push github "${CI_COMMIT_SHA}:refs/heads/${CI_COMMIT_REF_NAME}"
