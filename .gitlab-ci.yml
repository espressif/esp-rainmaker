stages:
  - build
  - test
  - deploy

variables:
  V: "0"
  MAKEFLAGS: "-j8 --no-keep-going"
  APP_BUILD: "all"
  GIT_SUBMODULE_STRATEGY: recursive
  ESP_DOCS_ENV_IMAGE: "$CI_DOCKER_REGISTRY/esp-idf-doc-env-v5.4:1-1"
  ESP_DOCS_PATH: "$CI_PROJECT_DIR"
  # KVS WebRTC SDK clone settings (used by camera example builds)
  KVS_SDK_PATH: "$CI_PROJECT_DIR/amazon-kinesis-video-streams-webrtc-sdk-c"

before_script:
   # add gitlab ssh key
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo -n $GITLAB_KEY > ~/.ssh/id_rsa_base64
    - base64 --decode --ignore-garbage ~/.ssh/id_rsa_base64 > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - echo -e "Host gitlab.espressif.cn\n\tStrictHostKeyChecking no\n" >> ~/.ssh/config
    # Create esp-rainmaker-bins-${CI_JOB_ID}/ dir (to copy binaries into for artifacts)
    - mkdir -p $CI_PROJECT_DIR/esp-rainmaker-bins-${CI_JOB_ID}

.setup_hardware: &setup_hardware
  - curl -o resource-pool-cli.py pn-tools.espressif.cn:5011/download-cli
  - python3 -m pip install paramiko scp esptool
  - |
    echo "Command: python3 resource-pool-cli.py grab --user-id ${CI_JOB_ID} --resource-type ${TARGET} --wait-time 60 --timeout 3600"
    if RESOURCE_OUTPUT=$(python3 resource-pool-cli.py grab --user-id ${CI_JOB_ID} --resource-type ${TARGET} --wait-time 60 --timeout 3600); then
      echo "RESOURCE_OUTPUT: $RESOURCE_OUTPUT"
      DEVICE_IP=$(echo "$RESOURCE_OUTPUT" | grep -E "^\s*ip:" | grep -oP 'ip: \K[^\s]+')
      RFC_PORT=$(echo "$RESOURCE_OUTPUT" | grep -E "^\s*rfc_port:" | grep -oP 'rfc_port: \K[^\s]+')
      export RESOURCE_ID=$(echo "$RESOURCE_OUTPUT" | grep -E "^\s*resource_id:" | grep -oP 'resource_id: \K[^\s]+')
      export DEVICE_PORT="rfc2217://${DEVICE_IP}:${RFC_PORT}"
      export RESOURCE_CONFIG_FILE=$(echo "$RESOURCE_OUTPUT" | grep -oP 'Resource data saved to: \K[^\s]+')
      echo "Device: $DEVICE_PORT | Config: $RESOURCE_CONFIG_FILE | Resource ID: $RESOURCE_ID"
      echo "$RESOURCE_ID" > ${CI_PROJECT_DIR}/.resource_id
      echo "${CI_JOB_ID}" > ${CI_PROJECT_DIR}/.job_id
    else
      echo "ERROR: Failed to grab ${TARGET} resource for job ${CI_JOB_ID}"
      echo "Resource allocation failed"
      exit 1
    fi

.release_hardware: &release_hardware
  - |
    if [ -f ${CI_PROJECT_DIR}/.resource_id ] && [ -f ${CI_PROJECT_DIR}/.job_id ]; then
      RESOURCE_ID=$(cat ${CI_PROJECT_DIR}/.resource_id)
      JOB_ID=$(cat ${CI_PROJECT_DIR}/.job_id)
      echo "Releasing resource: $RESOURCE_ID for job: $JOB_ID"
      python3 ${CI_PROJECT_DIR}/resource-pool-cli.py release --resource-id ${RESOURCE_ID} --user-id ${JOB_ID} || true
      rm -f ${CI_PROJECT_DIR}/.resource_id ${CI_PROJECT_DIR}/.job_id
    else
      echo "No resource to release (resource ID file not found)"
    fi

.flash_firmware: &flash_firmware
  - python3 ${CI_PROJECT_DIR}/resource-pool-cli.py erase-flash ${RESOURCE_CONFIG_FILE}
  - |
    if [ "$TARGET" == "esp32" ]; then
      BOOTLOADER_ADDR="0x1000"
    else
      BOOTLOADER_ADDR="0x0"
    fi
    python3 ${CI_PROJECT_DIR}/resource-pool-cli.py flash build/bootloader/bootloader.bin ${BOOTLOADER_ADDR} ${RESOURCE_CONFIG_FILE}
  - python3 ${CI_PROJECT_DIR}/resource-pool-cli.py flash build/partition_table/partition-table.bin 0x8000 ${RESOURCE_CONFIG_FILE}
  - python3 ${CI_PROJECT_DIR}/resource-pool-cli.py flash build/ota_data_initial.bin 0x16000 ${RESOURCE_CONFIG_FILE}
  - python3 ${CI_PROJECT_DIR}/resource-pool-cli.py flash build/esp_rainmaker_test.bin 0x20000 ${RESOURCE_CONFIG_FILE}

.generate_rainmaker_claim_data: &generate_rainmaker_claim_data
  - python3 -m pip install esp-rainmaker-cli
  - esp-rainmaker-cli profile switch global
  # login/claim are non-fatal (tests can self-claim), but make a failure LOUD so a
  # credentials regression is visible instead of silently degrading CI to the fallback.
  - "esp-rainmaker-cli login --user_name \"${UT_USERNAME}\" --password \"${UT_PASSWORD}\" || echo \"WARNING [unit-test]: RainMaker login FAILED (check UT_USERNAME/UT_PASSWORD) — falling back to self-claim; investigate if this persists\""
  - "esp-rainmaker-cli claim --mac \"${MAC_ADDR}\" --outdir \"${CI_PROJECT_DIR}/.rainmaker_claim\" || echo \"WARNING [unit-test]: RainMaker claim FAILED — continuing without claim data\""
  - export CLAIM_DATA_PATH=$(find "${CI_PROJECT_DIR}/.rainmaker_claim" -type d -name "${MAC_ADDR}" 2>/dev/null | head -n 1)
  - "if [ -n \"${CLAIM_DATA_PATH}\" ] && [ -f \"${CLAIM_DATA_PATH}/node.info\" ]; then export NODE_ID=$(cat \"${CLAIM_DATA_PATH}/node.info\"); echo \"Claim data ready: $NODE_ID\"; else echo \"No claim data; tests will run without claiming.\"; fi"

.build_test_app: &build_test_app
  - cd $CI_PROJECT_DIR/components/esp_rainmaker/test_app
  - idf.py set-target $TARGET
  - idf.py build

.build_matter_examples: &build_matter_examples
  # start building examples
  - for EXAMPLE in $EXAMPLES; do
  - cd $CI_PROJECT_DIR/examples/$EXAMPLE
  - echo Building $EXAMPLE
  # build examples for the targets
  - for TARGET in $EXAMPLE_TARGETS; do
  - echo Building for $TARGET
  - idf.py set-target $TARGET
  - idf.py build
  - mkdir -p $CI_PROJECT_DIR/esp-rainmaker-bins-${CI_JOB_ID}/$EXAMPLE/$TARGET/
  - cp $CI_PROJECT_DIR/examples/$EXAMPLE/build/*.bin $CI_PROJECT_DIR/esp-rainmaker-bins-${CI_JOB_ID}/$EXAMPLE/$TARGET/
  - done
  - echo Build Complete for $EXAMPLE
  - done
  # Generating zip file for binaries generated
  - cd $CI_PROJECT_DIR
  - echo Generating zip file for binaries generated
  - tar -zcvf esp-rainmaker-bins-${CI_JOB_ID}.zip esp-rainmaker-bins-${CI_JOB_ID}/

.build_matter_controller_example: &build_matter_controller_example
  # start build controller example for the targets
  - cd $CI_PROJECT_DIR/examples/matter/matter_controller
  - for TARGET in $CONTROLLER_EXAMPLE_TARGET; do
  - echo Build matter controller for $TARGET
  - idf.py set-target $CONTROLLER_EXAMPLE_TARGET
  - idf.py build
  - mkdir -p $CI_PROJECT_DIR/esp-rainmaker-bins-${CI_JOB_ID}/matter/matter_controller/$TARGET/
  - cp $CI_PROJECT_DIR/examples/matter/matter_controller/build/*.bin $CI_PROJECT_DIR/esp-rainmaker-bins-${CI_JOB_ID}/matter/matter_controller/$TARGET/
  - done
  - echo Build Complete for matter_controller
  # Generating zip file for binaries generated
  - cd $CI_PROJECT_DIR
  - echo Generating zip file for binaries generated
  - tar -zcvf esp-rainmaker-bins-${CI_JOB_ID}.zip esp-rainmaker-bins-${CI_JOB_ID}/

.build_all_examples: &build_all_examples
  - for EXAMPLE in $EXAMPLES; do
  - cd $CI_PROJECT_DIR/examples/$EXAMPLE
  - echo Building $EXAMPLE
  - if [[ "$EXAMPLE" == "thread_br" ]]; then
  -   sed -i "/CONFIG_LWIP_IPV6_NUM_ADDRESSES=8/c\\CONFIG_LWIP_IPV6_NUM_ADDRESSES=12" sdkconfig.defaults
  - fi
  - for TARGET in $EXAMPLE_TARGETS; do
  - echo Building for $TARGET
  - rm -rf managed_components dependencies.lock build sdkconfig sdkconfig.old
  - idf.py set-target $TARGET
  - idf.py build
  - mkdir -p $CI_PROJECT_DIR/esp-rainmaker-bins-${CI_JOB_ID}/$EXAMPLE/$TARGET/
  - cp $CI_PROJECT_DIR/examples/$EXAMPLE/build/*.bin $CI_PROJECT_DIR/esp-rainmaker-bins-${CI_JOB_ID}/$EXAMPLE/$TARGET/
  - done
  - echo Build Complete for $EXAMPLE
  - if [[ "$EXAMPLE" == "thread_br" ]]; then
  -   sed -i "/CONFIG_LWIP_IPV6_NUM_ADDRESSES=12/c\\CONFIG_LWIP_IPV6_NUM_ADDRESSES=8" sdkconfig.defaults
  - fi
  - done
  # Generating zip file for binaries generated
  - cd $CI_PROJECT_DIR
  - echo Generating zip file for binaries generated
  - tar -zcvf esp-rainmaker-bins-${CI_JOB_ID}.zip esp-rainmaker-bins-${CI_JOB_ID}/

.build_camera_examples: &build_camera_examples
  # Clone KVS WebRTC SDK pinned at $KVS_GIT_COMMIT
  - cd $CI_PROJECT_DIR
  - git clone $KVS_GITHUB_PATH $KVS_SDK_PATH
  - git -C $KVS_SDK_PATH checkout $KVS_GIT_COMMIT
  - git -C $KVS_SDK_PATH submodule update --init --recursive --depth 1
  # start building examples
  - for EXAMPLE in $EXAMPLES; do
  - cd $CI_PROJECT_DIR/examples/$EXAMPLE
  - echo Building $EXAMPLE
  # build examples for the targets
  - for TARGET in $EXAMPLE_TARGETS; do
  - echo Building for $TARGET
  - idf.py set-target $TARGET
  - idf.py build
  - mkdir -p $CI_PROJECT_DIR/esp-rainmaker-bins-${CI_JOB_ID}/$EXAMPLE/$TARGET/
  - cp $CI_PROJECT_DIR/examples/$EXAMPLE/build/*.bin $CI_PROJECT_DIR/esp-rainmaker-bins-${CI_JOB_ID}/$EXAMPLE/$TARGET/
  - done
  - echo Build Complete for $EXAMPLE
  - done
  # Generating zip file for binaries generated
  - cd $CI_PROJECT_DIR
  - echo Generating zip file for binaries generated
  - tar -zcvf esp-rainmaker-bins-${CI_JOB_ID}.zip esp-rainmaker-bins-${CI_JOB_ID}/

.build_homekit_examples: &build_homekit_examples
  # Clone esp-homekit-sdk
  - cd $CI_PROJECT_DIR/examples/homekit_switch
  - cd components
  - echo Cloning esp-homekit-sdk
  - git clone --recursive --branch master --depth 1 https://github.com/espressif/esp-homekit-sdk.git
  - cd ..
  - export HOMEKIT_PATH=$PWD/components/esp-homekit-sdk
  # start building homekit_switch example
  - cd $CI_PROJECT_DIR/examples/homekit_switch
  - echo Building homekit_switch
  # build for the targets
  - for TARGET in $EXAMPLE_TARGETS; do
  - echo Building for $TARGET
  - rm -rf managed_components dependencies.lock build sdkconfig sdkconfig.old
  - idf.py set-target $TARGET
  - idf.py build
  - mkdir -p $CI_PROJECT_DIR/esp-rainmaker-bins-${CI_JOB_ID}/homekit_switch/$TARGET/
  - cp $CI_PROJECT_DIR/examples/homekit_switch/build/*.bin $CI_PROJECT_DIR/esp-rainmaker-bins-${CI_JOB_ID}/homekit_switch/$TARGET/
  - done
  - echo Build Complete for homekit_switch
  # Generating zip file for binaries generated
  - cd $CI_PROJECT_DIR
  - echo Generating zip file for binaries generated
  - tar -zcvf esp-rainmaker-bins-${CI_JOB_ID}.zip esp-rainmaker-bins-${CI_JOB_ID}/

.build_template:
  stage: build
  image: espressif/idf:latest
  tags:
    - build
  variables:
    PEDANTIC_FLAGS: "-Werror -Werror=deprecated-declarations -Wno-error=cpp -Werror=unused-variable -Werror=unused-but-set-variable -Werror=unused-function"
    EXTRA_CFLAGS: "${PEDANTIC_FLAGS}"
    EXTRA_CXXFLAGS: "${PEDANTIC_FLAGS}"
    EXAMPLE_TARGETS: "esp32"
    EXAMPLES: "switch led_light fan temperature_sensor multi_device gpio"
  script:
    - *build_all_examples

build_idf_v5.1:
  extends: .build_template
  image: espressif/idf:release-v5.1
  variables:
    EXAMPLE_TARGETS: "esp32 esp32s2 esp32c3 esp32s3 esp32c6 esp32c2 esp32h2"

build_idf_v5.2:
  extends: .build_template
  image: espressif/idf:release-v5.2
  variables:
    EXAMPLE_TARGETS: "esp32 esp32s2 esp32c3 esp32s3 esp32c6 esp32c2 esp32h2"

build_idf_v5.3:
  extends: .build_template
  image: espressif/idf:release-v5.3
  variables:
    EXAMPLE_TARGETS: "esp32 esp32s2 esp32c3 esp32s3 esp32c6 esp32c2 esp32h2"

build_idf_v5.4:
  extends: .build_template
  image: espressif/idf:release-v5.4
  variables:
    EXAMPLE_TARGETS: "esp32 esp32s2 esp32c3 esp32s3 esp32c6 esp32c2 esp32h2"

build_idf_v5.5:
  extends: .build_template
  image: espressif/idf:release-v5.5
  variables:
    EXAMPLE_TARGETS: "esp32 esp32s2 esp32c3 esp32s3 esp32c6 esp32c2 esp32h2 esp32c5"

build_standalone_camera:
  extends: .build_template
  image: espressif/idf:v5.5.1
  variables:
    PEDANTIC_FLAGS: "-Werror -Werror=deprecated-declarations -Wno-error=cpp -Wno-error=int-to-pointer-cast -Wno-error=pointer-to-int-cast"
